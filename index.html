<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Auth Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="auth-box" id="authBox">
            <h2 id="formTitle">Login to Account</h2>
            <p class="message" id="responseMsg"></p>
            
            <form id="authForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="name@domain.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••" minlength="8">
                </div>
                <button type="submit" id="submitBtn">Sign In</button>
            </form>

            <div class="toggle-text">
                <span id="toggleMsg">Don't have an account?</span> 
                <a href="#" id="toggleLink">Register here</a>
            </div>
        </div>

        <div class="auth-box hidden" id="dashboardBox">
            <h2>Welcome to Dashboard 🎉</h2>
            <p id="userWelcome"></p>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
